{{- if eq .Values.proxy.mode "oauth2proxy" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth2proxy
  namespace: {{ .Values.global.namespace }}
  labels:
    app: oauth2proxy
  annotations:
    # ingress-nginx が TLS を終端して oauth2-proxy (HTTP) に転送する
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.oauth2proxy.ingress.host }}
      secretName: {{ .Values.oauth2proxy.tls.secretName }}
  rules:
    - host: {{ .Values.oauth2proxy.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2proxy
                port:
                  number: {{ .Values.oauth2proxy.port }}
{{- end }}
