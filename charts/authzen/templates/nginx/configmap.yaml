{{- if eq .Values.proxy.mode "nginx" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Values.global.namespace }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log  /dev/stderr warn;

    # nginx は起動時に環境変数を削除するため、使用する変数を明示的に宣言する
    env OIDC_DISCOVERY_URL;
    env OIDC_CLIENT_ID;
    env OIDC_CLIENT_SECRET;
    env OIDC_REDIRECT_URI;
    env OPA_URL;
    env OPA_POLICY_PATH;

    events {
      worker_connections 1024;
    }

    http {
      lua_package_path "/usr/local/lib/lua/?.lua;;";

      resolver __NAMESERVER__ valid=30s;  # 起動時に /etc/resolv.conf から動的に注入される

      lua_shared_dict discovery 1m;
      lua_shared_dict jwks     1m;
      lua_shared_dict sessions 10m;

      # ingress-nginx が TLS を終端して HTTP で転送してくる
      server {
        listen 80;

        # ingress-nginx からの X-Forwarded-Proto を引き継ぐ (なければ $scheme=http)
        set $real_proto $http_x_forwarded_proto;
        if ($real_proto = "") {
          set $real_proto $scheme;
        }

        set $access_token "";

        # --- OIDC認証 + OPA認可 ---
        location / {
          access_by_lua_block {
            local openidc = require("resty.openidc")
            local http    = require("resty.http")
            local cjson   = require("cjson")

            local token = nil
            local auth_header = ngx.req.get_headers()["Authorization"] or ""

            if auth_header:sub(1, 7) == "Bearer " then
              -- API クライアント (Swagger UI 等): Bearer トークンをそのまま使用
              -- OIDC セッションフロー(Keycloak リダイレクト)をスキップ
              token = auth_header:sub(8)
            else
              -- ブラウザ: セッションベース OIDC フロー
              local opts = {
                redirect_uri     = os.getenv("OIDC_REDIRECT_URI"),
                discovery        = os.getenv("OIDC_DISCOVERY_URL"),
                client_id        = os.getenv("OIDC_CLIENT_ID"),
                client_secret    = os.getenv("OIDC_CLIENT_SECRET"),
                scope            = "openid email profile",
                session_contents = { access_token = true },
                ssl_verify       = "no",  -- 開発用: 本番では "yes" にすること
              }
              local res, err = openidc.authenticate(opts)
              if err then
                ngx.log(ngx.ERR, "OIDC auth error: ", err)
                ngx.status = 401
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({ detail = "Unauthorized" }))
                ngx.exit(ngx.HTTP_UNAUTHORIZED)
              end
              if not res then
                -- openidc がコールバック処理やリダイレクトをすでに実施済み
                return
              end
              token = res.access_token
            end

            ngx.var.access_token = token

            -- OPA 認可チェック
            local httpc = http.new()
            local opa_input = cjson.encode({
              input = {
                token  = token,
                method = ngx.req.get_method(),
                path   = ngx.var.uri,
                query  = ngx.var.args or "",
              }
            })

            local opa_res, opa_err = httpc:request_uri(
              os.getenv("OPA_URL") .. os.getenv("OPA_POLICY_PATH"),
              {
                method  = "POST",
                body    = opa_input,
                headers = { ["Content-Type"] = "application/json" },
                timeout = 5000,
              }
            )

            if opa_err or not opa_res or opa_res.status ~= 200 then
              ngx.log(ngx.ERR, "OPA request failed: ", opa_err)
              ngx.status = 403
              ngx.header["Content-Type"] = "application/json"
              ngx.say(cjson.encode({ detail = "Forbidden" }))
              ngx.exit(ngx.HTTP_FORBIDDEN)
            end

            local result = cjson.decode(opa_res.body)
            if not result.result then
              ngx.status = 403
              ngx.header["Content-Type"] = "application/json"
              ngx.say(cjson.encode({ detail = "Forbidden by policy" }))
              ngx.exit(ngx.HTTP_FORBIDDEN)
            end
          }

          proxy_pass http://backend:{{ .Values.backend.port }};
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $real_proto;
          proxy_set_header Authorization     "Bearer $access_token";
        }

        # ヘルスチェック・Swagger UI は OIDC/OPA 不要
        location = /health {
          proxy_pass http://backend:{{ .Values.backend.port }}/health;
        }

        location /docs {
          proxy_pass http://backend:{{ .Values.backend.port }};
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $real_proto;
        }

        location /redoc {
          proxy_pass http://backend:{{ .Values.backend.port }};
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $real_proto;
        }

        location = /openapi.json {
          proxy_pass http://backend:{{ .Values.backend.port }};
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $real_proto;
        }
      }
    }
{{- end }}
